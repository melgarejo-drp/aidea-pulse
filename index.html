<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AIdea Pulse ⚡</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Bebas+Neue&display=swap');

  :root {
    --bg:      #0a0a0a;
    --surface: #111;
    --border:  #1e1e1e;
    --accent:  #c8ff00;
    --pink:    #ff2d78;
    --blue:    #00cfff;
    --text:    #f0f0f0;
    --dim:     #555;
  }

  * { margin:0; padding:0; box-sizing:border-box; }

  body {
    background: var(--bg); color: var(--text);
    font-family: 'Space Mono', monospace;
    min-height: 100vh; padding: 0 0 80px;
  }

  /* HEADER */
  header {
    border-bottom: 1px solid var(--border);
    padding: 24px 32px;
    display: flex; align-items: center; justify-content: space-between;
    position: sticky; top: 0; background: rgba(10,10,10,0.95);
    backdrop-filter: blur(10px); z-index: 100;
  }

  .logo { font-family: 'Bebas Neue', sans-serif; font-size: 28px; letter-spacing: 3px; }
  .logo span { color: var(--accent); }

  .header-right { display: flex; align-items: center; gap: 16px; }

  #fecha-badge {
    font-size: 10px; color: var(--dim); letter-spacing: 2px; text-transform: uppercase;
  }

  #refresh-btn {
    background: var(--accent); color: #0a0a0a; border: none;
    font-family: 'Space Mono', monospace; font-size: 11px; font-weight: 700;
    padding: 8px 18px; border-radius: 4px; cursor: pointer;
    letter-spacing: 2px; transition: opacity 0.15s;
  }
  #refresh-btn:hover { opacity: 0.8; }
  #refresh-btn:disabled { opacity: 0.4; cursor: not-allowed; }

  /* LOADING */
  #loading {
    display: flex; flex-direction: column; align-items: center;
    justify-content: center; min-height: 60vh; gap: 20px;
  }

  .pulse-ring {
    width: 60px; height: 60px; border-radius: 50%;
    border: 3px solid transparent;
    border-top-color: var(--accent);
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  #loading p { font-size: 11px; color: var(--dim); letter-spacing: 3px; }

  /* ERROR */
  #error-box {
    display: none; margin: 40px auto; max-width: 500px;
    background: #1a0000; border: 1px solid #440000;
    border-radius: 8px; padding: 24px; text-align: center;
    font-size: 12px; color: var(--pink);
  }

  /* MAIN GRID */
  #content { display: none; max-width: 1100px; margin: 0 auto; padding: 32px; }

  /* FRASE DEL DÍA */
  .frase-banner {
    border: 1px solid var(--border); border-left: 3px solid var(--accent);
    border-radius: 8px; padding: 20px 24px; margin-bottom: 32px;
    font-size: 15px; color: var(--accent); font-style: italic; line-height: 1.6;
  }

  /* SECTION TITLES */
  .section-title {
    font-size: 10px; letter-spacing: 4px; color: var(--dim);
    text-transform: uppercase; margin-bottom: 16px;
    display: flex; align-items: center; gap: 8px;
  }
  .section-title::after {
    content: ''; flex: 1; height: 1px; background: var(--border);
  }

  /* GRID */
  .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 32px; }
  .grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; margin-bottom: 32px; }

  @media (max-width: 800px) {
    .grid-2, .grid-3 { grid-template-columns: 1fr; }
    #content { padding: 20px; }
    header { padding: 16px 20px; }
  }

  /* CARDS */
  .card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 10px; padding: 20px;
    transition: border-color 0.2s;
  }
  .card:hover { border-color: #333; }

  .card-tag {
    font-size: 9px; letter-spacing: 2px; color: var(--dim);
    text-transform: uppercase; margin-bottom: 10px;
  }

  .card h3 { font-size: 13px; line-height: 1.5; color: var(--text); margin-bottom: 8px; }
  .card p  { font-size: 11px; color: var(--dim); line-height: 1.7; }
  .card .highlight { color: var(--accent); font-size: 11px; margin-top: 8px; }
  .card .sub { color: #444; font-size: 10px; margin-top: 6px; }

  /* Instagram cards */
  .card.instagram { border-left: 2px solid var(--pink); }
  .card.instagram .card-tag { color: var(--pink); }
  .card.instagram .hook {
    font-size: 14px; color: var(--text); font-weight: 700;
    line-height: 1.4; margin-bottom: 10px;
    border-left: 2px solid var(--pink); padding-left: 12px;
  }

  /* LinkedIn cards */
  .card.linkedin { border-left: 2px solid var(--blue); }
  .card.linkedin .card-tag { color: var(--blue); }
  .card.linkedin h3 { color: var(--blue); }

  /* Stat card */
  .stat-card {
    background: linear-gradient(135deg, #0d1a00, #111);
    border: 1px solid #1a3300; border-radius: 10px; padding: 24px;
    margin-bottom: 32px; display: flex; gap: 24px; align-items: center;
  }
  .stat-number {
    font-family: 'Bebas Neue', sans-serif; font-size: 52px;
    color: var(--accent); line-height: 1; min-width: 80px; text-align: center;
  }
  .stat-info h4 { font-size: 13px; color: var(--text); margin-bottom: 4px; }
  .stat-info p  { font-size: 11px; color: var(--dim); line-height: 1.6; }
  .stat-info .fuente { font-size: 10px; color: #333; margin-top: 6px; }

  /* Sources */
  .sources {
    border-top: 1px solid var(--border); padding-top: 24px; margin-top: 16px;
  }
  .sources a {
    display: inline-block; font-size: 10px; color: var(--dim);
    text-decoration: none; margin-right: 16px; margin-bottom: 6px;
    border-bottom: 1px solid #222; padding-bottom: 2px;
    transition: color 0.15s, border-color 0.15s;
  }
  .sources a:hover { color: var(--text); border-color: #555; }

  /* CTA badge */
  .cta-badge {
    display: inline-block; background: #1a0a00; border: 1px solid #3d1a00;
    border-radius: 4px; padding: 4px 10px; font-size: 9px;
    color: #ff8c00; letter-spacing: 1px; margin-top: 8px;
  }

  /* Formato badge */
  .fmt-badge {
    display: inline-block; background: #0d001a; border: 1px solid #2d0044;
    border-radius: 4px; padding: 4px 10px; font-size: 9px;
    color: #aa44ff; letter-spacing: 1px; margin-top: 8px;
  }

  /* Timestamp */
  #gen-time { font-size: 9px; color: #2a2a2a; letter-spacing: 2px; text-align: center; margin-top: 24px; }
</style>
</head>
<body>

<header>
  <div class="logo">AI<span>DEA</span> PULSE ⚡</div>
  <div class="header-right">
    <div id="fecha-badge">cargando...</div>
    <button id="refresh-btn" onclick="loadBrief()">↻ ACTUALIZAR</button>
  </div>
</header>

<div id="loading">
  <div class="pulse-ring"></div>
  <p>BUSCANDO TENDENCIAS Y GENERANDO IDEAS...</p>
</div>

<div id="error-box"></div>

<div id="content">

  <!-- Frase -->
  <div class="frase-banner" id="frase"></div>

  <!-- Stat -->
  <div class="section-title">📊 DATO DEL DÍA</div>
  <div class="stat-card" id="stat-card">
    <div class="stat-number" id="stat-num">—</div>
    <div class="stat-info">
      <h4 id="stat-dato"></h4>
      <p id="stat-uso"></p>
      <div class="fuente" id="stat-fuente"></div>
    </div>
  </div>

  <!-- Tendencias -->
  <div class="section-title">🔥 TENDENCIAS</div>
  <div class="grid-3" id="tendencias-grid"></div>

  <!-- Instagram -->
  <div class="section-title">📱 IDEAS PARA INSTAGRAM REELS</div>
  <div class="grid-3" id="instagram-grid"></div>

  <!-- LinkedIn -->
  <div class="section-title">💼 IDEAS PARA LINKEDIN</div>
  <div class="grid-2" id="linkedin-grid"></div>

  <!-- Sources -->
  <div class="sources">
    <div class="section-title">🔗 FUENTES</div>
    <div id="sources-list"></div>
  </div>

  <div id="gen-time"></div>
</div>

<script>
async function loadBrief() {
  const btn = document.getElementById('refresh-btn');
  btn.disabled = true;
  btn.textContent = '↻ GENERANDO...';
  document.getElementById('loading').style.display = 'flex';
  document.getElementById('content').style.display  = 'none';
  document.getElementById('error-box').style.display = 'none';

  try {
    const res  = await fetch('/api/brief');
    const data = await res.json();

    if (!res.ok || data.error) throw new Error(data.error || 'Error desconocido');

    render(data);
  } catch(e) {
    document.getElementById('loading').style.display = 'none';
    const eb = document.getElementById('error-box');
    eb.style.display = 'block';
    eb.innerHTML = `❌ ${e.message}<br><br><button onclick="loadBrief()" style="margin-top:12px;background:none;border:1px solid #440000;color:#ff2d78;font-family:inherit;font-size:11px;padding:8px 16px;cursor:pointer;border-radius:4px;">REINTENTAR</button>`;
  } finally {
    btn.disabled  = false;
    btn.textContent = '↻ ACTUALIZAR';
  }
}

function render(d) {
  document.getElementById('loading').style.display = 'none';
  document.getElementById('content').style.display = 'block';

  document.getElementById('fecha-badge').textContent = d.fecha || '';
  document.getElementById('frase').textContent = `"${d.frase_del_dia}"`;

  // Stat
  const statDato = d.stat_del_dia?.dato || '';
  const numMatch = statDato.match(/[\d,.]+%?/);
  document.getElementById('stat-num').textContent  = numMatch ? numMatch[0] : '★';
  document.getElementById('stat-dato').textContent  = statDato;
  document.getElementById('stat-uso').textContent   = d.stat_del_dia?.uso || '';
  document.getElementById('stat-fuente').textContent = `Fuente: ${d.stat_del_dia?.fuente || ''}`;

  // Tendencias
  const tGrid = document.getElementById('tendencias-grid');
  tGrid.innerHTML = (d.tendencias || []).map(t => `
    <div class="card">
      <div class="card-tag">TENDENCIA</div>
      <h3>${t.titulo}</h3>
      <p>${t.por_que_importa}</p>
      <div class="highlight">${t.angulo_aidea}</div>
    </div>
  `).join('');

  // Instagram
  const igGrid = document.getElementById('instagram-grid');
  igGrid.innerHTML = (d.ideas_instagram || []).map(i => `
    <div class="card instagram">
      <div class="card-tag">📱 REEL IDEA</div>
      <div class="hook">"${i.hook}"</div>
      <p>${i.concepto}</p>
      <div class="fmt-badge">${i.formato}</div>
      <div class="cta-badge">CTA: ${i.cta}</div>
    </div>
  `).join('');

  // LinkedIn
  const liGrid = document.getElementById('linkedin-grid');
  liGrid.innerHTML = (d.ideas_linkedin || []).map(l => `
    <div class="card linkedin">
      <div class="card-tag">💼 LINKEDIN</div>
      <h3>${l.titular}</h3>
      <p>${l.angulo}</p>
      <div class="sub">${l.estructura}</div>
    </div>
  `).join('');

  // Sources
  document.getElementById('sources-list').innerHTML = (d.sources || [])
    .map(s => `<a href="${s.url}" target="_blank" rel="noopener">${s.source}: ${s.title?.slice(0,40)}...</a>`)
    .join('');

  const gt = d.generado_en ? new Date(d.generado_en).toLocaleString('es-CO', {timeZone:'America/Bogota'}) : '';
  document.getElementById('gen-time').textContent = `Generado: ${gt}`;
}

// Cargar al iniciar
loadBrief();
</script>
</body>
</html>
